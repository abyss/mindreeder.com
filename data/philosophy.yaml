items:
  - icon: "🤝"
    title: "Human Connection"
    body: "The greatest effect is the bond between performer and audience. Craig works to make every individual feel seen, chosen, and part of something rare."

  - icon: "🧠"
    title: "Honest Deception"
    body: "The contract is clear: you know there's misdirection. The mystery is how. Craig's work doesn't ask for belief, only that you cannot quite explain what you witnessed."

  - icon: "✨"
    title: "Crafted Moments"
    body: "Nothing is left to chance. Each performance is choreographed to move audiences through a precise emotional arc: from curiosity to wonder to disbelief."
