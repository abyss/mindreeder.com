{{ define "main" }}
<article class="pt-36 pb-24 px-6">
  <div class="max-w-3xl mx-auto">
    <header class="mb-12 text-center">
      {{ with .Section }}<p class="section-label mb-4">{{ . | humanize }}</p>{{ end }}
      <h1 class="font-cormorant font-light text-white mb-6" style="font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.05;">
        {{ .Title }}
      </h1>
      {{ with .Description }}
      <p class="font-cormorant italic text-mist-light" style="font-size: 1.2rem;">{{ . }}</p>
      {{ end }}
      <div class="divider-gold mt-8"></div>
    </header>
    <div class="prose-performer">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
